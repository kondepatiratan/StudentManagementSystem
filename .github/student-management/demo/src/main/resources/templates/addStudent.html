<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>Add Student</h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/save}"
                          th:object="${student}"
                          method="post">

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>Course</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{course}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label>Phone</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}"
                                   required>

                        </div>

                        <button class="btn btn-success">
                            Save Student
                        </button>

                        <a href="/" class="btn btn-secondary">
                            Back
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
